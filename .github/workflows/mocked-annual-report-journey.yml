name: Mocked Annual-Report Journey CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mocked-backend-journey:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run mocked backend annual-report journey
        run: |
          python -m pytest -q backend/tests/test_mocked_ci_workflow_journey.py

  mocked-frontend-behavior:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run deterministic frontend behavior tests
        run: npm --prefix frontend test
